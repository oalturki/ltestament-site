<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آخری عہد نامہ — ایک کہانی، تین صحیفے</title>
<link rel="alternate" hreflang="ar" href="https://ltestament.com/">
<link rel="alternate" hreflang="en" href="https://ltestament.com/en/">
<link rel="alternate" hreflang="ur" href="https://ltestament.com/ur/">
<link rel="alternate" hreflang="fr" href="https://ltestament.com/fr/">
<link rel="alternate" hreflang="es" href="https://ltestament.com/es/">
<link rel="alternate" hreflang="x-default" href="https://ltestament.com/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#101B33;
    --night-deep:#0A1425;
    --parchment:#F3E8D0;
    --ink:#1B1B18;
    --gold:#C89B3C;
    --gold-soft:#DCC078;
    --teal:#3E7C74;
    --cream:#EFE6D8;
    --torah:#8C6E4E;
    --gospel:#6E7F8C;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{ background:var(--parchment); color:var(--ink); font-family:'Noto Nastaliq Urdu',serif; font-weight:400; line-height:1.85; overflow-x:hidden; }
  @media (prefers-reduced-motion: reduce){ *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;} }
  a{color:inherit;text-decoration:none;}
  h1,h2,h3{font-family:'Noto Nastaliq Urdu',serif; font-weight:700;}

  nav{ position:fixed; top:0; left:0; right:0; z-index:50; display:flex; align-items:center; justify-content:space-between; padding:22px 6vw; mix-blend-mode:difference; }
  .logo{ font-family:'Noto Nastaliq Urdu',serif; font-size:1.2rem; font-weight:800; color:var(--cream); display:flex; align-items:center; gap:10px; }
  .logo svg{width:20px;height:20px;}
  .nav-links{display:flex; gap:32px; font-size:0.9rem;}
  .nav-links a{color:var(--cream); opacity:0.85; transition:opacity 0.2s;}
  .nav-links a:hover{opacity:1;}
  .lang-switch{ display:flex; gap:6px; margin-inline-start:24px; }
  .lang-switch a{ font-size:0.78rem; padding:4px 9px; border:1px solid rgba(200,155,60,0.35); border-radius:4px; color:var(--cream); opacity:0.75; }
  .lang-switch a.active{ background:var(--gold); color:var(--night-deep); opacity:1; border-color:var(--gold); font-weight:700; }
  @media (max-width:760px){ .nav-links{display:none;} }

  .hero{ position:relative; min-height:100vh; background:radial-gradient(ellipse 80% 60% at 50% 35%, var(--night) 0%, var(--night-deep) 70%); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:120px 6vw 80px; overflow:hidden; }
  .glow{ position:absolute; width:900px; height:900px; top:50%; left:50%; transform:translate(-50%,-55%); background:radial-gradient(circle, rgba(200,155,60,0.22) 0%, rgba(200,155,60,0) 65%); animation:pulse 6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:0.6; transform:translate(-50%,-55%) scale(1);} 50%{opacity:1; transform:translate(-50%,-55%) scale(1.08);} }
  .star-motif{ width:56px; height:56px; margin-bottom:32px; opacity:0.9; animation:spinSlow 40s linear infinite; }
  @keyframes spinSlow{ to{ transform:rotate(360deg); } }

  .brand-mark{ font-family:'Noto Nastaliq Urdu',serif; font-size:clamp(2.2rem,6vw,3.8rem); color:var(--parchment); font-weight:800; margin-bottom:10px; }
  .brand-mark em{ font-style:normal; color:var(--gold-soft); }
  .brand-sub{ font-size:0.9rem; letter-spacing:0.04em; color:var(--teal); margin-bottom:46px; font-weight:500; }

  .ayah-arabic{ font-family:'Amiri',serif; font-size:clamp(1.6rem, 3.6vw, 2.7rem); color:var(--gold-soft); line-height:2; max-width:820px; margin-bottom:20px; opacity:0; animation:writeIn 1.8s 0.3s ease-out forwards; }
  @keyframes writeIn{ 0%{opacity:0; letter-spacing:0.2em; filter:blur(6px);} 100%{opacity:1; letter-spacing:normal; filter:blur(0);} }
  .ayah-ref{ font-size:0.85rem; color:var(--gold); opacity:0; font-weight:500; animation:fadeUp 1s 1.6s ease-out forwards; }
  @keyframes fadeUp{ 0%{opacity:0; transform:translateY(14px);} 100%{opacity:1; transform:translateY(0);} }

  .scroll-cue{ position:absolute; bottom:34px; left:50%; transform:translateX(-50%); color:var(--cream); opacity:0.5; font-size:0.78rem; letter-spacing:0.1em; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .scroll-cue .line{width:1px; height:26px; background:var(--gold-soft); animation:drop 1.8s ease-in-out infinite;}
  @keyframes drop{ 0%{transform:scaleY(0); transform-origin:top;} 50%{transform:scaleY(1); transform-origin:top;} 51%{transform-origin:bottom;} 100%{transform:scaleY(0); transform-origin:bottom;} }

  .divider{ display:flex; justify-content:center; padding:64px 0 20px; }
  .divider svg{ width:42px; height:42px; opacity:0.5; }

  /* ---------- FIGURES ---------- */
  .figures{ padding:110px 6vw 100px; }
  .figures-scroll{ display:flex; gap:20px; overflow-x:auto; padding:10px 4px 26px; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
  .figures-scroll::-webkit-scrollbar{ height:6px; }
  .figures-scroll::-webkit-scrollbar-track{ background:rgba(27,27,24,0.08); }
  .figures-scroll::-webkit-scrollbar-thumb{ background:var(--gold); border-radius:3px; }
  .figure-card{ flex:0 0 250px; scroll-snap-align:start; background:#FBF4E3; border-top:3px solid var(--gold); padding:28px 24px; display:flex; flex-direction:column; min-height:260px; }
  .figure-eyebrow{ font-size:0.78rem; color:var(--teal); font-weight:700; margin-bottom:6px; }
  .figure-name{ font-family:'Amiri',serif; font-size:1.5rem; color:var(--ink); margin-bottom:14px; }
  .figure-fact{ font-size:0.92rem; color:#544f42; flex-grow:1; line-height:1.85; }
  .figure-link{ margin-top:18px; font-size:0.85rem; color:var(--gold); font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
  .figure-link:hover{ color:#a97f2c; }

  section{ padding:0 6vw; }
  .section-inner{ max-width:1100px; margin:0 auto; }
  .eyebrow{ font-size:0.85rem; color:var(--teal); font-weight:700; margin-bottom:14px; }
  .section-head{ text-align:center; max-width:640px; margin:0 auto 64px; }
  .section-head h2{ font-size:clamp(1.6rem, 3vw, 2.2rem); margin-bottom:16px; font-weight:800; }
  .section-head p{ color:#4a463c; font-size:1.02rem; }

  .timeline{ padding:110px 6vw 100px; }
  .timeline-track{ position:relative; max-width:1000px; margin:0 auto; }
  .timeline-line{ position:absolute; top:38px; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--gold) 0%, var(--gold) 34%, #A9A691 67%, #C9BBA0 100%); }
  .timeline-nodes{ position:relative; display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; }
  @media (max-width:820px){ .timeline-nodes{ grid-template-columns:1fr; } .timeline-line{ display:none; } }
  .t-node{ display:flex; flex-direction:column; align-items:center; text-align:center; }
  .t-dot{ width:16px; height:16px; border-radius:50%; background:var(--torah); margin-bottom:22px; position:relative; z-index:2; box-shadow:0 0 0 6px var(--parchment); }
  .t-node:nth-child(2) .t-dot{ background:var(--gospel); }
  .t-node:nth-child(3) .t-dot{ width:20px; height:20px; background:var(--gold); box-shadow:0 0 0 6px var(--parchment), 0 0 22px 4px rgba(200,155,60,0.55); }
  .t-era{ font-size:0.8rem; color:#8a836e; margin-bottom:10px; }
  .t-name{ font-size:1.3rem; margin-bottom:6px; font-weight:800; }
  .t-subname{ display:block; font-size:1.05rem; color:#8a836e; font-weight:500; margin-bottom:10px; }
  .t-node:nth-child(3) .t-subname{ color:var(--gold-soft); }
  .t-node:nth-child(3) .t-name{ color:var(--gold); }
  .t-quote{ font-family:'Amiri',serif; font-size:1.3rem; color:var(--night); margin-bottom:10px; line-height:1.7; cursor:pointer; transition:color 0.2s; border-bottom:1px dashed rgba(200,155,60,0.5); padding-bottom:6px; }
  .t-quote:hover{ color:var(--gold); }
  .t-node:nth-child(3) .t-quote{ color:var(--gold); font-weight:700; }
  .t-hint{ font-size:0.72rem; color:#a89f83; margin-bottom:6px; }

  .modal-overlay{ position:fixed; inset:0; background:rgba(10,20,37,0.72); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:24px; z-index:200; opacity:0; pointer-events:none; transition:opacity 0.25s; }
  .modal-overlay.open{ opacity:1; pointer-events:auto; }
  .modal-box{ background:var(--parchment); max-width:560px; width:100%; padding:40px 36px; border-radius:2px; position:relative; transform:translateY(16px); transition:transform 0.25s; border-top:3px solid var(--gold); }
  .modal-overlay.open .modal-box{ transform:translateY(0); }
  .modal-close{ position:absolute; top:16px; left:16px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink); opacity:0.5; font-size:1.4rem; }
  .modal-close:hover{ opacity:1; }
  .modal-eyebrow{ font-size:0.8rem; color:var(--teal); font-weight:700; margin-bottom:16px; }
  .modal-arabic{ font-family:'Amiri',serif; font-size:1.35rem; line-height:2.1; color:var(--ink); margin-bottom:18px; }
  .modal-ref{ font-size:0.85rem; color:var(--gold); font-weight:700; margin-bottom:18px; }
  .modal-note{ font-size:0.88rem; color:#544f42; border-top:1px solid rgba(27,27,24,0.12); padding-top:16px; }
  .modal-tree-label{ font-size:0.85rem; color:var(--teal); font-weight:700; margin-bottom:10px; }
  .modal-tree{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
  .modal-tree span{ background:rgba(200,155,60,0.14); color:var(--night); font-family:'Amiri',serif; font-size:0.95rem; padding:5px 12px; border-radius:20px; border:1px solid rgba(200,155,60,0.35); }
  .modal-closing{ font-family:'Amiri',serif; font-size:1.1rem; color:var(--gold); text-align:center; margin-bottom:14px; line-height:1.8; }
  .t-desc{ font-size:0.88rem; color:#8a836e; max-width:280px; }
  .t-node:nth-child(3) .t-desc{ color:#7a6f4e; font-weight:600; }
  .timeline-note-title{ text-align:center; font-size:1rem; color:var(--teal); font-weight:700; margin-top:56px; }
  .timeline-note{ text-align:center; max-width:680px; margin:14px auto 0; font-size:1.15rem; color:#6b644f; font-family:'Amiri',serif; line-height:2.1; }
  .timeline-note-ref{ display:block; margin-top:10px; font-family:'Noto Nastaliq Urdu',serif; font-size:0.82rem; color:var(--teal); font-weight:600; }

  .timeline-nodes{ direction:ltr; }
  .t-node{ direction:rtl; }
  .timeline-line{ background:linear-gradient(90deg, #C9BBA0 0%, #A9A691 33%, var(--gold) 66%, var(--gold) 100%); }

  .paths{ padding-bottom:100px; }
  .paths-grid{ display:grid; grid-template-columns:1.4fr 1fr; gap:22px; }
  @media (max-width:760px){ .paths-grid{ grid-template-columns:1fr; } }
  .path-card{ background:var(--night); color:var(--cream); border-radius:2px; padding:38px 32px; position:relative; border:1px solid rgba(200,155,60,0.25); transition:transform 0.35s ease, border-color 0.35s ease; display:flex; flex-direction:column; min-height:300px; }
  .path-card:hover{ transform:translateY(-6px); border-color:var(--gold); }
  .path-tag{ font-size:0.8rem; color:var(--gold-soft); margin-bottom:18px; font-weight:600;}
  .path-card h3{ font-size:1.35rem; margin-bottom:14px; color:var(--parchment); font-weight:800; }
  .path-card p{ color:#C9C2AE; font-size:0.96rem; flex-grow:1; }
  .path-card .go{ margin-top:24px; font-size:0.88rem; color:var(--gold-soft); display:inline-flex; align-items:center; gap:8px; font-weight:600; }
  .path-card .go svg{ width:14px; height:14px; transition:transform 0.25s; transform:scaleX(-1); }
  .path-card:hover .go svg{ transform:scaleX(-1) translateX(4px); }

  .facts{ background:var(--night-deep); padding:70px 6vw; }
  .facts-grid{ max-width:1100px; margin:0 auto; display:grid; grid-template-columns:repeat(4,1fr); gap:30px; text-align:center; }
  @media (max-width:720px){ .facts-grid{ grid-template-columns:repeat(2,1fr); } }
  .fact-num{ font-family:'Noto Nastaliq Urdu',serif; font-size:2.3rem; color:var(--gold-soft); font-weight:800;}
  .fact-label{ color:var(--cream); font-size:0.85rem; opacity:0.75; margin-top:6px; }

  .topics{ padding:110px 6vw; }
  .topics-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:rgba(27,27,24,0.12); border:1px solid rgba(27,27,24,0.12); }
  @media (max-width:760px){ .topics-grid{ grid-template-columns:1fr; } }
  .topic-cell{ background:var(--parchment); padding:34px 28
